<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Broadcast Announcement</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/animation.css') }}">
    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
</head>
<body>
    <div class="sidebar">
        <h2>ERP {{ session['user_role'].upper() if session.get('user_role') else 'PORTAL' }}</h2>
        <ul>
            <li><a href="/{{ session['user_role'].lower() if session.get('user_role') else 'admin' }}">⬅ Back to Dashboard</a></li>
            <li><a href="/announcements">View Live Notices</a></li>
        </ul>

        <div class="theme-selector">
            <button class="theme-btn theme-light" onclick="setTheme('light')" title="Light Mode"></button>
            <button class="theme-btn theme-dark" onclick="setTheme('dark')" title="Dark Mode"></button>
            <button class="theme-btn theme-neon" onclick="setTheme('neon')" title="Neon Mode"></button>
        </div>
    </div>

    <div class="content">
        <h1>Broadcast Official Notice</h1>

        <div class="card animate-fade-up" style="max-width: 600px;">
            <p style="color: var(--text-muted); margin-bottom: 20px;">Send a system-wide alert to all students, parents, and faculty members.</p>

            <form action="/save-announcement" method="POST">
                <label>Notice Title</label>
                <input type="text" name="title" placeholder="e.g., Unexpected Holiday Tomorrow" required>

                <label>Message Content</label>
                <textarea name="message" rows="5" placeholder="Type your official broadcast message here..." required style="resize: vertical;"></textarea>

                <label>Broadcasted By</label>
                <input type="text" name="sender" value="{{ session.get('user_name', 'System Admin') }}" readonly style="opacity: 0.7; cursor: not-allowed;">

                <button type="submit" class="animate-jelly" style="width: 100%; margin-top: 15px;">Send Broadcast Alert</button>
            </form>
        </div>
    </div>
</body>
</html>
