<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet"
href="{{ url_for('static', filename='css/style.css') }}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Teachers</title>
</head>
<body>

<h1>Manage Teachers</h1>

<a href="/add-teacher">

Add New Teacher

</a>

<br><br>

<table border="1">

<tr>

<th>ID</th>

<th>Name</th>

<th>Teacher ID</th>

<th>Subject</th>

<th>Phone</th>

<th>Email</th>

<th>Actions</th>

</tr>

{% for teacher in teachers %}

<tr>

<td>{{ teacher.id }}</td>

<td>{{ teacher.name }}</td>

<td>{{ teacher.teacher_id }}</td>

<td>{{ teacher.subject }}</td>

<td>{{ teacher.phone }}</td>

<td>{{ teacher.email }}</td>

<td>

<a href="/edit-teacher/{{ teacher.id }}">
Edit
</a>

|

<a href="/delete-teacher/{{ teacher.id }}">
Delete
</a>

</td>

</tr>

{% endfor %}

</table>

</body>
</html>
