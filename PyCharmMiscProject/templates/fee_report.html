<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet"
href="{{ url_for('static', filename='css/style.css') }}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fee Report</title>
</head>

<body>

<h1>Fee Report</h1>

<table border="1">

<tr>

<th>Roll No</th>

<th>Name</th>

<th>Class</th>

<th>Total Fee</th>

<th>Paid Fee</th>

<th>Balance</th>

<th>Status</th>

</tr>

{% for fee in fees %}

<tr>

<td>{{ fee.roll_no }}</td>

<td>{{ fee.student_name }}</td>

<td>{{ fee.student_class }}</td>

<td>{{ fee.total_fee }}</td>

<td>{{ fee.paid_fee }}</td>

<td>{{ fee.balance_fee }}</td>

<td>{{ fee.status }}</td>

</tr>

{% endfor %}

</table>

</body>

</html>
