<!DOCTYPE html>
<html>
<head>
<title>Edit Teacher</title>
    <link rel="stylesheet"
href="{{ url_for('static', filename='css/style.css') }}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<h1>Edit Teacher</h1>

<form
action="/update-teacher/{{ teacher.id }}"
method="POST">

<input
type="text"
name="name"
value="{{ teacher.name }}">

<br><br>

<input
type="text"
name="teacher_id"
value="{{ teacher.teacher_id }}">

<br><br>

<input
type="text"
name="subject"
value="{{ teacher.subject }}">

<br><br>

<button>

Update Teacher

</button>

</form>

</body>
</html>
