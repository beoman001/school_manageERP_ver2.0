<!DOCTYPE html>
<html>

<head>
      <link rel="stylesheet"
href="{{ url_for('static', filename='css/style.css') }}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Classes</title>
</head>

<body>

<h1>Manage Classes</h1>

<table border="1">

<tr>
    <th>ID</th>
    <th>Class Name</th>
</tr>

{% for c in classes %}

<tr>
    <td>{{ c.id }}</td>
    <td>{{ c.class_name }}</td>
</tr>

{% endfor %}

</table>

</body>

</html>
