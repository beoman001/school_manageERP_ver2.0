<!DOCTYPE html>
<html>

<head>
<link rel="stylesheet"
href="{{ url_for('static', filename='css/style.css') }}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notes Library</title>

</head>

<body>

<h1>Notes Library</h1>

<table border="1">

<tr>

<th>Subject</th>

<th>Title</th>

<th>Download</th>

</tr>

{% for note in notes %}

<tr>

<td>{{ note.subject }}</td>

<td>{{ note.title }}</td>

<td>

<a
href="{{ url_for(
'static',
filename='uploads/' + note.filename
) }}"
download>

Download

</a>

</td>

</tr>

{% endfor %}

</table>

</body>

</html>
