<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Profile</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/animation.css') }}">
    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
</head>
<body>
    <div class="sidebar">
        <h2>ERP {{ role.upper() if role else 'PORTAL' }}</h2>
        <ul>
            <li><a href="/{{ role.lower() if role else '' }}">⬅ Back to Dashboard</a></li>
        </ul>

        <div class="theme-selector">
            <button class="theme-btn theme-light" onclick="setTheme('light')" title="Light Mode"></button>
            <button class="theme-btn theme-dark" onclick="setTheme('dark')" title="Dark Mode"></button>
            <button class="theme-btn theme-neon" onclick="setTheme('neon')" title="Neon Mode"></button>
        </div>
    </div>

    <div class="content">
        <h1>My Personal Biodata</h1>

        <div class="card animate-fade-up" style="max-width: 600px;">
            <div style="display: flex; align-items: center; gap: 20px; margin-bottom: 30px;">
                <div style="width: 80px; height: 80px; border-radius: 50%; background: var(--accent-main); display: flex; align-items: center; justify-content: center; color: white; font-size: 2rem; font-weight: bold;">
                    {{ user.name[0] }}
                </div>
                <div>
                    <h2 style="margin: 0; color: var(--accent-main);">{{ user.name }}</h2>
                    <p style="color: var(--text-muted); font-weight: 500;">{{ user.email }}</p>
                </div>
            </div>

            <form action="/biodata" method="POST" enctype="multipart/form-data">
                <label>Date of Birth</label>
                <input type="date" name="dob" value="{{ user.dob or '' }}">

                <label>Blood Group</label>
                <input type="text" name="blood_group" value="{{ user.blood_group or '' }}" placeholder="e.g., O+">

                <label>Home Address</label>
                <textarea name="address" rows="3">{{ user.address or '' }}</textarea>

                {% if role == 'Teacher' %}
                <label>Educational Qualifications</label>
                <input type="text" name="qualification" value="{{ user.qualification or '' }}">
                {% endif %}

                <label>Update Profile Picture</label>
                <input type="file" name="profile_pic" accept="image/*" style="padding: 10px 0;">

                <button type="submit" class="animate-jelly" style="width: 100%; margin-top: 15px;">Save Profile Changes</button>
            </form>
        </div>
    </div>
</body>
</html>
