<!DOCTYPE html>
<html>

<head>
<title>Bus Fee Management</title>
    <link rel="stylesheet"
href="{{ url_for('static', filename='css/style.css') }}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<h1>Bus Fee Calculator</h1>

<form action="/save-bus-fee" method="POST">

<input
type="text"
name="student_name"
placeholder="Student Name"
required>

<br><br>
<label>Route Name</label>
<input type="text" name="route_name" required>
    <br><br>
<input
type="number"
step="0.1"
name="distance"
placeholder="Distance in KM"
required>

<br><br>

<button type="submit">
Calculate Fee
</button>

</form>

</body>

</html>
