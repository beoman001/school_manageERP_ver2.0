<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bulk Attendance Entry</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script>
        // Simple JavaScript to instantly filter students by class without reloading the page
        function filterStudents() {
            let selectedClass = document.getElementById('class_filter').value.toLowerCase();
            let selectedDiv = document.getElementById('div_filter').value.toLowerCase();
            let rows = document.querySelectorAll('.student-row');

            rows.forEach(row => {
                let sClass = row.getAttribute('data-class').toLowerCase();
                let sDiv = row.getAttribute('data-div').toLowerCase();

                if (sClass.includes(selectedClass) && sDiv.includes(selectedDiv)) {
                    row.style.display = "";
                } else {
                    row.style.display = "none";
                }
            });
        }
    </script>
</head>
<body>
    <div class="sidebar">
        <h2>ERP FACULTY</h2>
        <ul>
            <li><a href="/teacher">⬅ Back to Dashboard</a></li>
            <li><a href="/attendance-report">View Master Logs</a></li>
        </ul>
    </div>

    <div class="content">
        <h1>Class Attendance Roster</h1>

        <div class="card">
            <form action="/mark-attendance-bulk" method="POST">

                <div style="display: flex; gap: 20px; margin-bottom: 20px; background: rgba(0,0,0,0.2); padding: 20px; border-radius: 10px;">
                    <div style="flex: 1;">
                        <label>Select Date:</label>
                        <input type="date" name="date" required>
                    </div>
                    <div style="flex: 1;">
                        <label>Target Class:</label>
                        <input type="text" id="class_filter" name="student_class" placeholder="e.g. 10" onkeyup="filterStudents()" required>
                    </div>
                    <div style="flex: 1;">
                        <label>Division:</label>
                        <input type="text" id="div_filter" name="division" placeholder="e.g. A" onkeyup="filterStudents()" required>
                    </div>
                </div>

                <table>
                    <thead>
                        <tr>
                            <th>Roll No</th>
                            <th>Student Name</th>
                            <th>Present</th>
                            <th>Absent</th>
                            <th>Half-Day</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for student in students %}
                        <tr class="student-row" data-class="{{ student.student_class }}" data-div="{{ student.division }}">
                            <td style="color: var(--neon-blue); font-weight: bold;">{{ student.roll_no }}</td>
                            <td>{{ student.name }}</td>

                            <td>
                                <input type="radio" name="status_{{ student.roll_no }}" value="Present" style="width: 20px; height: 20px; accent-color: #00ff88;">
                            </td>
                            <td>
                                <input type="radio" name="status_{{ student.roll_no }}" value="Absent" style="width: 20px; height: 20px; accent-color: #ff4757;">
                            </td>
                            <td>
                                <input type="radio" name="status_{{ student.roll_no }}" value="Half-Day" style="width: 20px; height: 20px; accent-color: #ffaa00;">
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>

                <button type="submit" style="margin-top: 20px; width: 100%;">Submit Attendance Record</button>
            </form>
        </div>
    </div>
</body>
</html>
